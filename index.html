<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="theme-color" content="#1A6B1A"/>
<link rel="manifest" href="manifest.json"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<title>Wildcat Fireworks — Idalou, TX</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #080F08;
  --surface: #0F1A0F;
  --surf2:   #172117;
  --border:  #223322;
  --green:   #1A6B1A;
  --greenlt: #28A028;
  --gold:    #F5C000;
  --golddk:  #C09500;
  --red:     #E03030;
  --text:    #F2F0E6;
  --muted:   #6E8A6E;
  --card:    #0D180D;
}
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── HERO ─────────────────────────── */
.hero {
  background: radial-gradient(ellipse 140% 100% at 50% -10%,
    #0e2a0e 0%, #080F08 65%);
  padding: 0 0 28px;
  text-align: center;
  position: relative;
  overflow: hidden;
  border-bottom: 2px solid var(--border);
}

/* Top green bar */
.hero-topbar {
  background: linear-gradient(90deg, var(--green) 0%, #0F3A0F 50%, var(--green) 100%);
  padding: 7px 16px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold);
  border-bottom: 1px solid var(--golddk);
}

/* Logo image */
.logo-wrap {
  padding: 22px 20px 0;
  display: flex;
  justify-content: center;
  position: relative;
  z-index: 2;
}
.logo-img {
  width: min(260px, 60vw);
  height: auto;
  display: block;
  filter: drop-shadow(0 0 20px rgba(245,192,0,0.35))
          drop-shadow(0 4px 12px rgba(0,0,0,0.7));
}

/* Tagline below logo */
.hero-tag {
  margin-top: 6px;
  font-size: clamp(11px, 2.8vw, 14px);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 600;
  position: relative; z-index: 2;
}
.hero-tag strong { color: var(--gold); }

/* Search */
.search-wrap {
  margin: 18px auto 0;
  max-width: 460px;
  padding: 0 16px;
  position: relative; z-index: 2;
  display: flex; align-items: center; gap: 10px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  transition: border-color 0.15s;
}
.search-wrap:focus-within { border-color: var(--gold); }
.search-wrap svg { color: var(--muted); flex-shrink: 0; }
#searchInput {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-size: 16px; padding: 14px 0; font-family: inherit;
}
#searchInput::placeholder { color: var(--muted); }
#clearBtn { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; padding: 4px 0; display: none; line-height: 1; }

/* ── FILTERS ─────────────────────── */
.filters-bar {
  padding: 11px 12px; display: flex; gap: 8px; align-items: center;
  overflow-x: auto; scrollbar-width: none;
  background: var(--surface); border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 20;
}
.filters-bar::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0; background: var(--surf2); border: 1.5px solid var(--border);
  color: var(--muted); font-size: 13px; font-weight: 600;
  padding: 8px 14px; border-radius: 20px; cursor: pointer;
  white-space: nowrap; user-select: none; font-family: inherit;
  transition: all 0.15s; -webkit-tap-highlight-color: transparent;
}
.chip:active { opacity: 0.75; }
.chip.on-gold  { background: var(--gold);   border-color: var(--gold);   color: #080F08; }
.chip.on-green { background: var(--green);  border-color: var(--green);  color: #fff; }
.chip.on-red   { background: var(--red);    border-color: var(--red);    color: #fff; }
.chip.on-teal  { background: #00AA98;       border-color: #00AA98;       color: #080F08; }
.divider { flex-shrink: 0; width: 1px; height: 24px; background: var(--border); }
.sort-select {
  flex-shrink: 0; background: var(--surf2); border: 1.5px solid var(--border);
  color: var(--text); font-family: inherit; font-size: 13px;
  padding: 8px 12px; border-radius: 10px; cursor: pointer; outline: none;
}

/* ── CATEGORIES ──────────────────── */
.section { padding: 16px 12px 6px; }
.section-title {
  font-size: 10px; font-weight: 700; letter-spacing: 0.20em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
  display: flex; align-items: center; gap: 10px;
}
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
@media (min-width: 700px) { .cat-grid { grid-template-columns: repeat(8, 1fr); } }

.cat-card {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 13px; padding: 11px 4px 9px;
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  cursor: pointer; text-align: center; min-height: 72px;
  transition: border-color 0.15s, background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.cat-card:active { opacity: 0.75; }
.cat-card.active { border-color: var(--gold); background: rgba(245,192,0,0.08); }
.cat-icon { font-size: 22px; line-height: 1; }
.cat-label { font-size: 9.5px; font-weight: 600; color: var(--muted); line-height: 1.2; }
.cat-card.active .cat-label { color: var(--gold); }

/* ── PRODUCTS ────────────────────── */
.products-header {
  display: flex; align-items: center; padding: 12px 12px 8px;
}
.product-count { font-size: 13px; color: var(--muted); }
#clearAllBtn {
  background: none; border: none; color: var(--gold); font-size: 12px;
  font-weight: 600; cursor: pointer; font-family: inherit; margin-left: 8px; display: none;
}

.products-grid {
  padding: 0 12px 80px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 11px;
}
@media (min-width: 540px) { .products-grid { grid-template-columns: repeat(3, 1fr); } }
@media (min-width: 800px) { .products-grid { grid-template-columns: repeat(4, 1fr); } }

/* ── PRODUCT CARD ────────────────── */
.product-card {
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: 15px; overflow: hidden; cursor: pointer;
  display: flex; flex-direction: column; position: relative;
  -webkit-tap-highlight-color: transparent; transition: border-color 0.15s;
}
.product-card:active { opacity: 0.82; }

.staff-badge {
  position: absolute; top: 7px; left: 7px; z-index: 2;
  background: var(--gold); color: #080F08;
  font-size: 9px; font-weight: 800;
  padding: 3px 8px; border-radius: 5px;
  text-transform: uppercase; letter-spacing: 0.07em;
}

.product-thumb {
  aspect-ratio: 4/3; background: var(--surf2);
  display: flex; align-items: center; justify-content: center;
  font-size: 48px; position: relative; overflow: hidden;
}
.product-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.play-icon {
  position: absolute; bottom: 7px; right: 7px;
  background: rgba(0,0,0,0.72); border: 1px solid rgba(255,255,255,0.15);
  color: #fff; font-size: 9px; width: 26px; height: 26px;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  padding-left: 2px;
}
.no-video-badge {
  position: absolute; bottom: 7px; right: 7px;
  background: rgba(0,0,0,0.72); border: 1px solid rgba(255,255,255,0.12);
  color: var(--muted); font-size: 8px; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase;
  padding: 4px 7px; border-radius: 6px;
  display: flex; align-items: center; gap: 4px;
}
.no-video-badge::before { content: '📷'; font-size: 9px; }

.product-body { padding: 10px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
.product-cat { font-size: 9.5px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--greenlt); }
.product-name { font-size: 15px; font-weight: 800; line-height: 1.15; }
.product-desc { font-size: 10.5px; color: var(--muted); line-height: 1.45; flex: 1; }

.tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 3px; }
.tag { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
.tag-staff       { background: rgba(245,192,0,0.14);   color: var(--gold);  border: 1px solid rgba(245,192,0,0.28); }
.tag-loud        { background: rgba(224,48,48,0.12);   color: #f07070;      border: 1px solid rgba(224,48,48,0.26); }
.tag-colorful    { background: rgba(140,80,255,0.12);  color: #a87fff;      border: 1px solid rgba(140,80,255,0.26); }
.tag-family      { background: rgba(0,180,160,0.10);   color: #00C4AE;      border: 1px solid rgba(0,180,160,0.26); }
.tag-value       { background: rgba(40,160,60,0.12);   color: #4ac46a;      border: 1px solid rgba(40,160,60,0.26); }
.tag-finale      { background: rgba(230,110,0,0.12);   color: #ff9040;      border: 1px solid rgba(230,110,0,0.26); }
.tag-favorite    { background: rgba(245,192,0,0.14);   color: var(--gold);  border: 1px solid rgba(245,192,0,0.28); }
.tag-willow      { background: rgba(40,180,100,0.12);  color: #4ed68a;      border: 1px solid rgba(40,180,100,0.26); }
.tag-blue        { background: rgba(50,120,255,0.12);  color: #7aabff;      border: 1px solid rgba(50,120,255,0.28); }
.tag-fastpaced   { background: rgba(224,48,48,0.12);   color: #f07070;      border: 1px solid rgba(224,48,48,0.26); }
.tag-brocade     { background: rgba(200,150,0,0.14);   color: #d4a800;      border: 1px solid rgba(200,150,0,0.30); }
.tag-glitter     { background: rgba(255,100,180,0.12); color: #ff80c8;      border: 1px solid rgba(255,100,180,0.28); }
.tag-color       { background: rgba(140,80,255,0.12);  color: #a87fff;      border: 1px solid rgba(140,80,255,0.26); }
.tag-longshow    { background: rgba(0,180,160,0.10);   color: #00C4AE;      border: 1px solid rgba(0,180,160,0.26); }
.tag-palm        { background: rgba(120,180,40,0.12);  color: #8ecf3a;      border: 1px solid rgba(120,180,40,0.28); }

.product-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 7px; }
.product-price  { font-size: 21px; font-weight: 900; color: var(--gold); }
.btn-demo {
  background: none; border: 1.5px solid var(--border); color: var(--muted);
  font-family: inherit; font-size: 11px; font-weight: 600;
  padding: 5px 9px; border-radius: 7px; cursor: pointer;
}
.no-demo-label {
  font-size: 10px; font-weight: 600; color: var(--muted);
  opacity: 0.6; letter-spacing: 0.03em;
}

/* ── EMPTY ───────────────────────── */
.empty { text-align: center; padding: 60px 20px; color: var(--muted); grid-column: 1 / -1; }
.empty-icon  { font-size: 48px; margin-bottom: 12px; }
.empty-title { font-size: 22px; font-weight: 800; color: var(--text); margin-bottom: 8px; }

/* ── MODAL ───────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.92);
  z-index: 100; display: none; align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; }
@media (min-width: 600px) { .modal-overlay { align-items: center; padding: 20px; } }

.modal {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 22px 22px 0 0; width: 100%; max-width: 560px;
  max-height: 92vh; overflow-y: auto; scrollbar-width: none; position: relative;
}
.modal::-webkit-scrollbar { display: none; }
@media (min-width: 600px) { .modal { border-radius: 18px; max-height: 88vh; } }

/* Green-to-gold accent stripe */
.modal::before {
  content: ''; display: block; height: 3px;
  background: linear-gradient(90deg, var(--green) 0%, var(--gold) 50%, var(--green) 100%);
  border-radius: 22px 22px 0 0;
}
@media (min-width: 600px) { .modal::before { border-radius: 18px 18px 0 0; } }

.modal-handle {
  width: 34px; height: 4px; background: var(--border);
  border-radius: 2px; margin: 10px auto 0;
}
@media (min-width: 600px) { .modal-handle { display: none; } }

.modal-close {
  position: absolute; top: 13px; right: 13px;
  background: var(--surf2); border: 1.5px solid var(--border);
  color: var(--text); width: 36px; height: 36px; border-radius: 50%;
  font-size: 17px; cursor: pointer; display: flex; align-items: center;
  justify-content: center; z-index: 5;
}

.modal-video-wrap { width: 100%; aspect-ratio: 16/9; background: #000; }
.modal-video-wrap video { width: 100%; height: 100%; object-fit: contain; display: block; }
.no-video-ph {
  width: 100%; aspect-ratio: 16/9; background: var(--surf2);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 10px; color: var(--muted); border-bottom: 1px solid var(--border);
}
.no-video-ph .bige { font-size: 54px; }
.no-video-ph p { font-size: 12px; text-align: center; padding: 0 20px; }
.no-video-ph code { color: var(--gold); font-size: 11px; }

.modal-body  { padding: 17px 17px 28px; }
.modal-cat   { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--greenlt); margin-bottom: 4px; }
.modal-name  { font-size: 30px; font-weight: 900; line-height: 1; margin-bottom: 6px; }
.modal-price { font-size: 38px; font-weight: 900; color: var(--gold); margin-bottom: 13px; }
.modal-desc  { font-size: 15px; line-height: 1.65; color: #b4c0b4; margin-bottom: 13px; }

/* ── FOOTER ──────────────────────── */
.site-footer {
  text-align: center; padding: 22px 16px 30px;
  border-top: 1px solid var(--border); color: var(--muted); font-size: 12px;
  letter-spacing: 0.05em;
}
.site-footer strong { color: var(--gold); }

/* ── SOLD OUT ────────────────────── */
.sold-out-overlay {
  position: absolute; inset: 0; z-index: 3;
  background: rgba(0,0,0,0.72);
  display: flex; align-items: center; justify-content: center;
}
.sold-out-label {
  background: var(--red); color: #fff;
  font-size: 15px; font-weight: 900;
  letter-spacing: 0.18em; text-transform: uppercase;
  padding: 8px 18px; border-radius: 6px;
  transform: rotate(-18deg);
  box-shadow: 0 3px 14px rgba(0,0,0,0.7);
  border: 2px solid rgba(255,255,255,0.25);
}
.product-card.is-sold-out { opacity: 0.55; }
</style>
</head>
<body>

<!-- HERO -->
<header class="hero">
  <div class="hero-topbar"><a href="https://maps.google.com/?q=9620+E+Hwy+62-82,+Idalou,+TX+79329" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;">📍 9620 E Hwy 62-82, Idalou, TX 79329</a></div>
  <div class="logo-wrap">
    <img class="logo-img" src="public/wildcat-logo.png" alt="Wildcat Fireworks"/>
  </div>
  <div class="hero-tag">Browse our full selection below</div>
  <div class="search-wrap">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="searchInput" type="search" placeholder="Search products…" autocomplete="off" autocorrect="off"/>
    <button id="clearBtn" aria-label="Clear">✕</button>
  </div>
</header>

<!-- FILTERS -->
<div class="filters-bar">
  <select class="sort-select" id="sortSelect">
    <option value="default">Sort: Default</option>
    <option value="price-asc">Price: Low → High</option>
    <option value="price-desc">Price: High → Low</option>
    <option value="name">Name: A–Z</option>
  </select>
</div>

<!-- CATEGORIES -->
<div class="section">
  <div class="section-title">Shop by Category</div>
  <div class="cat-grid" id="catGrid"></div>
</div>

<!-- PRODUCTS -->
<div class="products-header">
  <span class="product-count" id="productCount"></span>
  <button id="clearAllBtn">✕ Clear filters</button>
</div>
<div class="products-grid" id="productsGrid"></div>

<!-- FOOTER -->
<footer class="site-footer">
  <strong>Wildcat Fireworks</strong><br>
  <a href="https://maps.google.com/?q=9620+E+Hwy+62-82,+Idalou,+TX+79329" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;">📍 9620 E Hwy 62-82, Idalou, TX 79329</a>
  <div id="syncDot" style="margin-top:10px;font-size:11px;color:var(--muted);">⏳ Connecting…</div>
</footer>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <button class="modal-close" id="modalClose">✕</button>
    <div id="modalMedia"></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ── PRODUCTS & STATE ─────────────────────────────────────────────────────────
var PRODUCTS = [];

// Restore overrides from localStorage so offline iPad shows last-known prices
var _stored = null;
try { _stored = JSON.parse(localStorage.getItem('wf_overrides')); } catch(e){}
window.DB_OVERRIDES = (_stored && _stored.soldOut && _stored.prices) ? _stored : {soldOut:[], prices:{}};

var CATEGORIES = [
  { label:"500g Cakes", emoji:"🎆" },
];

var TAG_CLASS = {
  "Staff Pick":     "tag-staff",
  "Loud":           "tag-loud",
  "Colorful":       "tag-colorful",
  "Family Friendly":"tag-family",
  "Best Value":     "tag-value",
  "Finale":         "tag-finale",
  "Fan Favorite":   "tag-favorite",
  "Willow Effect":  "tag-willow",
  "Blue Stars":     "tag-blue",
  "Fast-Paced":     "tag-fastpaced",
  "Gold Brocade":   "tag-brocade",
  "Glitter":        "tag-glitter",
  "Color Changing": "tag-color",
  "Long Show":      "tag-longshow",
  "Palm Effect":    "tag-palm",
};

var state = { search:"", category:null, filter:null, sort:"default" };

// ── CATEGORY CARDS ────────────────────────────────────────────────────────────
var catGrid = document.getElementById("catGrid");
CATEGORIES.forEach(function(c) {
  var div = document.createElement("div");
  div.className = "cat-card";
  div.dataset.cat = c.label;
  div.innerHTML = '<div class="cat-icon">'+c.emoji+'</div><div class="cat-label">'+c.label+'</div>';
  div.addEventListener("click", function() {
    if (c.label === "Staff Picks")      { toggleFilter("Staff Pick"); return; }
    if (c.label === "Family Friendly")  { toggleFilter("Family Friendly"); return; }
    state.category = (state.category === c.label) ? null : c.label;
    render();
  });
  catGrid.appendChild(div);
});

// ── CHIPS ─────────────────────────────────────────────────────────────────────
document.querySelectorAll(".chip").forEach(function(btn) {
  btn.addEventListener("click", function() {
    var f = btn.dataset.filter;
    if (f === "all") {
      state.filter = null; state.category = null; state.search = "";
      document.getElementById("searchInput").value = "";
    } else {
      toggleFilter(f);
    }
    render();
  });
});
function toggleFilter(f) {
  state.filter = (state.filter === f) ? null : f;
  state.category = null;
}

document.getElementById("sortSelect").addEventListener("change", function(){
  state.sort = this.value; render();
});

// ── SEARCH ────────────────────────────────────────────────────────────────────
var searchInput = document.getElementById("searchInput");
var clearBtn    = document.getElementById("clearBtn");
searchInput.addEventListener("input", function(){
  state.search = this.value;
  clearBtn.style.display = this.value ? "block" : "none";
  render();
});
clearBtn.addEventListener("click", function(){
  state.search = ""; searchInput.value = "";
  clearBtn.style.display = "none"; render();
});
document.getElementById("clearAllBtn").addEventListener("click", function(){
  state.search = ""; state.category = null; state.filter = null;
  searchInput.value = ""; clearBtn.style.display = "none";
  render();
});

// ── MODAL ─────────────────────────────────────────────────────────────────────
var overlay    = document.getElementById("modalOverlay");
var modalMedia = document.getElementById("modalMedia");
var modalBody  = document.getElementById("modalBody");
document.getElementById("modalClose").addEventListener("click", closeModal);
overlay.addEventListener("click", function(e){ if(e.target===overlay) closeModal(); });
document.addEventListener("keydown", function(e){ if(e.key==="Escape") closeModal(); });

function openModal(p, priceOverride) {
  var displayPrice = (priceOverride!=null) ? priceOverride : p.price;
  modalMedia.innerHTML = p.videoUrl
    ? '<div class="modal-video-wrap"><video controls preload="none"'+(p.thumbnailUrl?' poster="'+p.thumbnailUrl+'"':'')+'>'+
      '<source src="'+p.videoUrl+'" type="video/mp4"></video></div>'
    : '<div class="no-video-ph"><p style="color:var(--muted);font-size:13px;padding:40px 20px;text-align:center;">No video available</p></div>';

  var tagsHtml = p.tags.filter(function(t){ return t !== "Staff Pick"; }).map(function(t){
    return '<span class="tag '+(TAG_CLASS[t]||"tag-value")+'">'+t+'</span>';
  }).join("");
  modalBody.innerHTML =
    '<div class="modal-cat">'+p.category+'</div>'+
    '<div class="modal-name">'+p.name+'</div>'+
    '<div class="modal-price">$'+displayPrice.toFixed(2)+'</div>'+
    '<div class="modal-desc">'+p.description+'</div>'+
    '<div class="tags">'+tagsHtml+'</div>';

  overlay.classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeModal() {
  var vid = overlay.querySelector("video");
  if (vid) vid.pause();
  overlay.classList.remove("open");
  document.body.style.overflow = "";
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function getFiltered() {
  var overrides = window.DB_OVERRIDES;
  var list = PRODUCTS.slice();
  if (state.search.trim()) {
    var q = state.search.toLowerCase();
    list = list.filter(function(p){
      return p.name.toLowerCase().indexOf(q)>-1 ||
             p.description.toLowerCase().indexOf(q)>-1 ||
             p.category.toLowerCase().indexOf(q)>-1;
    });
  }
  if (state.category) list = list.filter(function(p){ return p.category===state.category; });
  if (state.filter)   list = list.filter(function(p){ return p.tags.indexOf(state.filter)>-1; });
  // Sort: use override price for price sorts so display matches sort order
  if (state.sort==="price-asc")  list.sort(function(a,b){
    var pa = overrides.prices[a.id]!=null ? overrides.prices[a.id] : a.price;
    var pb = overrides.prices[b.id]!=null ? overrides.prices[b.id] : b.price;
    return pa - pb;
  });
  if (state.sort==="price-desc") list.sort(function(a,b){
    var pa = overrides.prices[a.id]!=null ? overrides.prices[a.id] : a.price;
    var pb = overrides.prices[b.id]!=null ? overrides.prices[b.id] : b.price;
    return pb - pa;
  });
  if (state.sort==="name") list.sort(function(a,b){ return a.name.localeCompare(b.name); });
  return list;
}

function showLoading() {
  document.getElementById("productsGrid").innerHTML =
    '<div class="empty"><div class="empty-icon">🎆</div><div class="empty-title" style="font-size:16px;color:var(--muted)">Loading products…</div></div>';
}

function render() {
  if (!PRODUCTS.length) { showLoading(); return; }

  var filtered = getFiltered();
  var hasFilter = state.category || state.filter || state.search;

  document.getElementById("productCount").textContent =
    filtered.length + (filtered.length===1?" product":" products");
  document.getElementById("clearAllBtn").style.display = hasFilter ? "inline" : "none";

  document.querySelectorAll(".chip").forEach(function(btn){
    var f = btn.dataset.filter;
    btn.className = "chip";
    if (f==="all" && !state.filter && !state.category && !state.search) btn.classList.add("on-gold");
    else if (f===state.filter) {
      if (f==="Loud") btn.classList.add("on-red");
      else if (f==="Family Friendly") btn.classList.add("on-teal");
      else btn.classList.add("on-gold");
    }
  });

  document.querySelectorAll(".cat-card").forEach(function(card){
    var cat = card.dataset.cat;
    var on = cat===state.category ||
             (cat==="Staff Picks" && state.filter==="Staff Pick") ||
             (cat==="Family Friendly" && state.filter==="Family Friendly");
    card.classList.toggle("active", on);
  });

  var grid = document.getElementById("productsGrid");
  grid.innerHTML = "";
  if (!filtered.length) {
    grid.innerHTML='<div class="empty"><div class="empty-icon">🎆</div><div class="empty-title">No products found</div><p style="font-size:14px;color:var(--muted)">Try a different search or clear your filters.</p></div>';
    return;
  }

  var overrides = window.DB_OVERRIDES;
  // Always push sold-out items to the bottom (within the current sort)
  filtered.sort(function(a,b){
    var aOut = overrides.soldOut.indexOf(a.id)>-1 ? 1 : 0;
    var bOut = overrides.soldOut.indexOf(b.id)>-1 ? 1 : 0;
    return aOut - bOut;
  });

  filtered.forEach(function(p){
    var soldOut = overrides.soldOut.indexOf(p.id)>-1;
    var price   = (overrides.prices[p.id]!=null) ? overrides.prices[p.id] : p.price;
    var tagsHtml = p.tags.filter(function(t){ return t !== "Staff Pick"; }).slice(0,3).map(function(t){
      return '<span class="tag '+(TAG_CLASS[t]||"tag-value")+'">'+t+'</span>';
    }).join("");
    var thumbHtml = p.thumbnailUrl
      ? '<img src="'+p.thumbnailUrl+'" alt="'+p.name+'" loading="lazy">'
      : '<span>🎆</span>';
    var soldOutHtml = soldOut ? '<div class="sold-out-overlay"><div class="sold-out-label">Sold Out</div></div>' : '';
    var mediaCornerHtml = p.videoUrl
      ? '<div class="play-icon">▶</div>'
      : '<div class="no-video-badge">Photo only</div>';
    var demoBtnHtml = p.videoUrl
      ? '<button class="btn-demo">▶ Demo</button>'
      : '<span class="no-demo-label">📷 Photo only</span>';
    var card = document.createElement("div");
    card.className = "product-card" + (soldOut ? " is-sold-out" : "");
    card.innerHTML =
      '<div class="product-thumb">'+thumbHtml+soldOutHtml+mediaCornerHtml+'</div>'+
      '<div class="product-body">'+
        '<div class="product-cat">'+p.category+'</div>'+
        '<div class="product-name">'+p.name+'</div>'+
        '<div class="product-desc">'+p.description+'</div>'+
        '<div class="tags">'+tagsHtml+'</div>'+
        '<div class="product-footer">'+
          '<div class="product-price">$'+price.toFixed(2)+'</div>'+
          demoBtnHtml+
        '</div>'+
      '</div>';
    card.addEventListener("click", function(){ openModal(p, price); });
    grid.appendChild(card);
  });
}

};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

function setSyncStatus(msg) {
  var el = document.getElementById('syncDot');
  if (el) el.textContent = msg;
}

function applyOverrides(data) {
  window.DB_OVERRIDES = data || {soldOut:[], prices:{}};
  if (!window.DB_OVERRIDES.soldOut) window.DB_OVERRIDES.soldOut = [];
  if (!window.DB_OVERRIDES.prices)  window.DB_OVERRIDES.prices  = {};
  try { localStorage.setItem('wf_overrides', JSON.stringify(window.DB_OVERRIDES)); } catch(e){}
  render();
}

var overridesRef = db.collection('catalog').doc('overrides');
overridesRef.onSnapshot(function(doc) {
  setSyncStatus('🟢 Live');
  applyOverrides(doc.exists ? doc.data() : null);
}, function(err) {
  setSyncStatus('🔴 Offline (' + err.code + ')');
  console.error('Firestore live updates unavailable:', err.code);
  overridesRef.get().then(function(doc) {
    setSyncStatus('🟡 Cached');
    applyOverrides(doc.exists ? doc.data() : null);
  }).catch(function() {
    setSyncStatus('🔴 No connection');
    render();
  });
});

// ── LOAD PRODUCTS (single source of truth: products.json) ────────────────────
showLoading();
fetch('public/products.json')
  .then(function(r){ return r.json(); })
  .then(function(data){ PRODUCTS = data; render(); })
  .catch(function(err){
    console.error('Failed to load products.json:', err);
    document.getElementById("productsGrid").innerHTML =
      '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">Could not load products</div><p style="font-size:14px;color:var(--muted)">Check your connection and refresh.</p></div>';
  });

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>
